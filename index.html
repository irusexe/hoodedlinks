<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOODED | Official</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;600&family=Creepster&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --accent-color: #9d00ff; /* Purple */
            --accent-glow: #d580ff;
            --card-bg: rgba(20, 20, 20, 0.8);
            --font-main: 'Syncopate', sans-serif;
            --font-body: 'Montserrat', sans-serif;
            --font-gothic: 'Creepster', cursive;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(157, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(120, 0, 255, 0.15) 0%, transparent 40%);
            color: var(--text-color);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* Background Canvas */
        #gang-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Header Styles */
        header {
            margin-bottom: 3rem;
        }

        h1 {
            font-family: var(--font-gothic);
            font-size: 4.5rem; /* Increased size for gothic font readability */
            font-weight: 400; /* UnifrakturMaguntia is usually 400 */
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(157, 0, 255, 0.4);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }

        /* Profile Card */
        .profile-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(157, 0, 255, 0.2);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            border-color: rgba(157, 0, 255, 0.5);
            box-shadow: 0 20px 60px rgba(157, 0, 255, 0.15);
        }

        .bio p {
            font-family: var(--font-gothic);
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #ccc;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        .bio p::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 2px;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Links */
        .links {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 1.5rem;
            background: rgba(20, 20, 20, 0.6);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .social-link span {
            flex-grow: 1;
            text-align: center;
        }

        .social-link svg {
            width: 20px;
            height: 20px;
            opacity: 0.8;
            transition: transform 0.3s ease;
        }

        .social-link:hover {
            background: rgba(157, 0, 255, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.3);
            transform: scale(1.02);
        }

        .social-link:hover svg {
            transform: scale(1.2) rotate(5deg);
            opacity: 1;
            color: var(--accent-glow);
        }

        /* Specific Brand Colors on Hover - OVERRIDDEN for theme consistency */
        .social-link.tiktok:hover { border-color: #9d00ff; box-shadow: 0 0 20px rgba(157, 0, 255, 0.3); }
        .social-link.discord:hover { border-color: #9d00ff; box-shadow: 0 0 20px rgba(157, 0, 255, 0.3); }
        .social-link.twitch:hover { border-color: #9d00ff; box-shadow: 0 0 20px rgba(157, 0, 255, 0.3); }
        .social-link.instagram:hover { border-color: #9d00ff; box-shadow: 0 0 20px rgba(157, 0, 255, 0.3); }

        /* Footer */
        footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 3.5rem; } /* Adjusted mobile size */
            .profile-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <script>
        console.log('HOODED Official Site Loaded');

        const canvas = document.getElementById('gang-bg');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        
        // Emojis for the background
        const items = ['🔫', '🔪', '🏎️', '💸', '🟣', '⛓️', '🩸'];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class GangParticle {
            constructor() {
                this.reset();
                this.x = Math.random() * width;
                this.y = Math.random() * height;
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height + height; 
                this.size = Math.random() * 20 + 20; // Larger for emojis
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = Math.random() * -1.5 - 0.5; 
                this.opacity = Math.random() * 0.4 + 0.1;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.item = items[Math.floor(Math.random() * items.length)];
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;

                if (this.y < -50) {
                    this.y = height + 50;
                    this.x = Math.random() * width;
                }
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffffff'; // Fallback
                ctx.fillText(this.item, 0, 0);
                
                // Add a subtle purple glow
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#9d00ff';
                ctx.restore();
            }
        }

        function init() {
            resize();
            for (let i = 0; i < 25; i++) {
                particles.push(new GangParticle());
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        init();
    </script>
